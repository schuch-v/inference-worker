name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run cache resolver tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Validate and test worker startup
        run: |
          bash -n src/start.sh
          bash tests/test_start.sh
